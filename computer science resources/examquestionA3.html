#### Question 2. State what a transaction is and identify four properties that define a transaction. [2]
A transaction is a sequence of SQL operations that are executed as a single unit of work in a database. The four properties that define a transaction is ACID, an acronyme for Atomicity, consistency, isolation and durability.

    <script>
      const fishTypes = [
        { right: "><((('>",  left: "<')))><" },
        { right: ">))>",     left: "<((<"    },
      ];

      const fish = [
        { type: 0, dir: 1, y: 20, speed: 0.4, x: 10, wobble: 0, wobbleSpeed: 0.02 },
        { type: 1, dir: -1, y: 50, speed: 0.6, x: 80, wobble: 1, wobbleSpeed: 0.03 },
        { type: 0, dir: 1, y: 75, speed: 0.3, x: 30, wobble: 2, wobbleSpeed: 0.025 },
      ];

      const els = fish.map(() => {
        const el = document.createElement('div');
        el.className = 'fish';
        document.body.appendChild(el);
        return el;
      });

      let t = 0;
      function animate() {
        t += 1;
        fish.forEach((f, i) => {
          f.x += f.dir * f.speed * 0.4;

          if (f.x > 105) { f.x = 105; f.dir = -1; }
          if (f.x < -5)  { f.x = -5;  f.dir = 1; }

          const wobbleY = Math.sin(t * f.wobbleSpeed + f.wobble) * 2;

          els[i].style.left = f.x + 'vw';
          els[i].style.top  = (f.y + wobbleY) + 'vh';

          const shape = fishTypes[f.type];
          els[i].textContent = f.dir === 1 ? shape.right : shape.left;
        });

        requestAnimationFrame(animate);
      }

      animate();
      </script>
